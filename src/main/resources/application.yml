spring:
  application:
    name: streakup
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
  jackson:
    deserialization:
      fail-on-unknown-properties: true

server:
  port: ${SERVER_PORT}
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_EXPOSED_ENDPOINTS}
  endpoint:
    health:
      probes:
        enabled: true

app:
  auth:
    jwt:
      secret: ${JWT_SECRET}
      access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS}
      refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS}
    cookie:
      name: refresh_token
      secure: ${REFRESH_COOKIE_SECURE}
      same-site: Lax
      path: /api/v1/auth
  attachment:
    presign-ttl-seconds: ${ATTACHMENT_PRESIGN_TTL_SECONDS}
    max-bytes: ${ATTACHMENT_MAX_BYTES}
    allowed-content-types: image/jpeg,image/png
  feature-flags:
    reminders: ${REMINDER_FEATURE_ENABLED}
    ai: ${AI_FEATURE_ENABLED}
